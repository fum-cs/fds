# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole site, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing these this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.github_repo }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: Foundations of Data Science
tagline: Course website of ADS & MFDS, FUM
description: ADS & MFDS Course website, Fall 2023
author: M. Amintoosi
baseurl: '/fds' # the subpath of your site, e.g. /blog
url: 'https://fum-cs.github.io' # the base hostname & protocol for your site, e.g. http://example.com
# Set a path/url to a logo that will be displayed instead of the title
logo: "/assets/images/fum-cs-logo.png"
# Set a path/url to a favicon that will be displayed by the browser
favicon_ico: "/assets/images/fum-logo.ico"

exclude: ["Gemfile", "Gemfile.lock", "LICENSE"]

# Theme settings
remote_theme: just-the-docs/just-the-docs@v0.6.2
color_scheme: light
search_enabled: true
heading_anchors: true
permalink: pretty
aux_links:
  CS Dept.:
    - 'https://fumcs.github.io'
  Mahmood Amintoosi:
    - 'https://mamintoosi.github.io'
  Class Repository:
    - 'https://github.com/fum-cs/fds'
footer_content:

# Collections for website data
collections:
  staffers:
  modules:
  schedules:
  announcements:
# Default layouts for each collection type
defaults:
  - scope:
      path: ''
      type: staffers
    values:
      layout: staffer
      height: 300
      subpath: '/assets/images/'
      width: 300
  - scope:
      path: ''
      type: modules
    values:
      layout: module
  - scope:
      path: ''
      type: schedules
    values:
      layout: schedule
  - scope:
      path: ''
      type: announcements
    values:
      layout: announcement

math: mathjax

mathjax:
  source: https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/latest.js?config=TeX-AMS_HTML
  config: 'MathJax.Hub.Config({ TeX: { equationNumbers: { autoNumber: "AMS" } } })'

compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: true
  profile: false

plugins:
  - jekyll-seo-tag

